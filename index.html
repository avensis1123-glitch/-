<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Summer Golf コンペ Results</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans JP', sans-serif; background-color: #f1f5f9; margin: 0; }
        .ranking-item { transition: all 0.3s ease-out; opacity: 0; transform: translateY(10px); }
        .ranking-item.show { opacity: 1; transform: translateY(0); }
        
        .reveal-winner { order: 1; background: linear-gradient(135deg, #fefce8 0%, #fef08a 100%); border: 2px solid #eab308; }
        .reveal-last { order: 2; background-color: #1e293b; color: #ffffff; border: 2px solid #ef4444; }
        .reveal-others { order: 3; background-color: #ffffff; border: 1px solid #e2e8f0; }
        .reveal-runnerup { background-color: #eef2ff; border: 1px solid #c7d2fe; }

        .item-text { color: #1e293b; }
        .reveal-last .item-text, .summary-last .item-text { color: #ffffff !important; }
        .reveal-last .sub-text, .summary-last .sub-text { color: #94a3b8 !important; }
        .sub-text { color: #64748b; }
        
        .summary-winner { background: linear-gradient(135deg, #fefce8 0%, #fef08a 100%); border: 1px solid #eab308; }
        .summary-last { background-color: #1e293b; color: #ffffff; border: 1px solid #ef4444; }
        .summary-runnerup { background-color: #eef2ff; border: 1px solid #c7d2fe; }
    </style>
</head>
<body class="w-full min-h-screen flex flex-col">
    <div id="app" class="w-full h-screen flex flex-col bg-white overflow-hidden">
        <header class="bg-slate-900 text-white px-4 py-3 shrink-0">
            <div class="flex items-center justify-between">
                <div>
                    <h1 class="text-lg font-black tracking-tight uppercase leading-none">Summer Golf コンペ</h1>
                    <p id="course-label" class="text-[9px] font-bold opacity-60 tracking-widest uppercase mt-1">OUT COURSE</p>
                </div>
                <div id="hidden-info" class="text-[9px] bg-slate-800 px-2 py-1 rounded border border-slate-700 font-bold uppercase">
                    HIDDEN: -
                </div>
            </div>
        </header>

        <nav class="flex border-b text-[10px] font-black bg-slate-50 shrink-0">
            <button onclick="changeTab('OUT')" id="tab-OUT" class="flex-1 py-3 text-slate-900 border-b-4 border-slate-900 bg-white">OUT</button>
            <button onclick="changeTab('IN')" id="tab-IN" class="flex-1 py-3 text-slate-400 hover:text-slate-600 border-b-4 border-transparent">IN</button>
            <button onclick="changeTab('SUMMARY')" id="tab-SUMMARY" class="flex-1 py-3 text-slate-400 hover:text-slate-600 border-b-4 border-transparent border-l">RESULTS LIST</button>
        </nav>

        <main id="main-content" class="flex-1 flex flex-col relative overflow-hidden bg-slate-50">
            <div id="action-bar" class="p-3 bg-slate-50/90 backdrop-blur-sm border-b border-slate-200 z-20 shrink-0 flex justify-center">
                <button id="reveal-btn" onclick="revealRank()" class="bg-indigo-600 hover:bg-indigo-700 text-white px-8 py-2.5 rounded-full font-black text-xs shadow-lg transition-all active:scale-95">
                    結果をラス前から順に発表
                </button>
            </div>

            <div id="ranking-list" class="flex-1 overflow-y-auto p-2 flex flex-col gap-1.5 content-start pb-10">
            </div>
        </main>

        <div id="summary-view" class="hidden flex-1 p-4 overflow-y-auto bg-white">
            <div id="summary-container" class="grid grid-cols-1 lg:grid-cols-2 gap-8 max-w-6xl mx-auto"></div>
        </div>
    </div>

    <script>
        const players = [
            {
                "name": "プレイヤーA",
                "scores": [4, 5, 4, 3, 5, 4, 4, 6, 4, 4, 5, 4, 4, 6, 5, 6, 3, 4]
            },
            {
                "name": "プレイヤーB",
                "scores": [4, 4, 5, 4, 6, 5, 3, 6, 5, 5, 5, 4, 5, 6, 4, 6, 4, 5]
            },
            {
                "name": "プレイヤーC",
                "scores": [4, 5, 5, 4, 6, 5, 4, 6, 5, 4, 5, 4, 5, 6, 5, 6, 4, 5]
            },
            {
                "name": "プレイヤーD",
                "scores": [5, 4, 4, 4, 5, 4, 4, 5, 5, 5, 4, 3, 5, 5, 5, 6, 4, 5]
            },
            {
                "name": "プレイヤーE",
                "scores": [4, 4, 4, 3, 6, 4, 3, 5, 5, 4, 4, 4, 4, 5, 4, 5, 4, 5]
            },
            {
                "name": "プレイヤーF",
                "scores": [5, 5, 5, 3, 7, 5, 4, 6, 5, 5, 5, 4, 5, 7, 5, 6, 4, 5]
            },
            {
                "name": "プレイヤーG",
                "scores": [4, 5, 4, 4, 6, 4, 4, 5, 4, 5, 5, 3, 4, 6, 5, 5, 3, 5]
            },
            {
                "name": "プレイヤーH",
                "scores": [4, 5, 5, 4, 6, 5, 4, 6, 5, 4, 5, 4, 5, 6, 5, 6, 4, 5]
            },
            {
                "name": "プレイヤーI",
                "scores": [5, 6, 6, 4, 7, 5, 5, 7, 5, 5, 5, 5, 6, 7, 6, 7, 5, 6]
            },
            {
                "name": "プレイヤーJ",
                "scores": [4, 4, 4, 3, 6, 4, 3, 5, 5, 4, 4, 4, 4, 5, 4, 5, 4, 5]
            }
        ];

        const config = {
            OUT: { hHoles: [1, 4, 5], hIdx: [0, 3, 4] },
            IN: { hHoles: [10, 12, 14], hIdx: [9, 11, 13] }
        };

        let activeMode = 'OUT';
        let sortedPlayers = [];
        let revealedIdx = 0;

        function calc(mode) {
            const start = mode === 'OUT' ? 0 : 9;
            const hIndices = config[mode].hIdx;
            const halfPars = mode === 'OUT' ? [4, 4, 4, 3, 5, 4, 3, 5, 4] : [4, 4, 3, 4, 5, 4, 5, 3, 4];
            const totalPar = halfPars.reduce((a, b) => a + b, 0);

            return players.map(p => {
                const s = p.scores.slice(start, start + 9);
                const g = s.reduce((a, b) => a + b, 0);
                const hSum = hIndices.reduce((sum, i) => sum + p.scores[i], 0);
                const hdcp = (hSum * 3 - totalPar) * 0.8;
                return { 
                    name: p.name, 
                    gross: g, 
                    hdcp: hdcp, 
                    net: parseFloat((g - hdcp).toFixed(1)) 
                };
            }).sort((a, b) => a.net !== b.net ? a.net - b.net : a.gross - b.gross);
        }

        function initApp() {
            sortedPlayers = calc(activeMode);
            revealedIdx = 0;
            document.getElementById('ranking-list').innerHTML = '';
            document.getElementById('action-bar').classList.remove('hidden');
            document.getElementById('course-label').textContent = `${activeMode} COURSE`;
            document.getElementById('hidden-info').textContent = `HIDDEN: ${config[activeMode].hHoles.join(', ')}`;
            document.getElementById('reveal-btn').textContent = '結果をラス前から順に発表';
        }

        function revealRank() {
            const len = sortedPlayers.length;
            const middleLimit = len - 2;

            if (revealedIdx < middleLimit) {
                const target = (len - 2) - revealedIdx;
                const p = sortedPlayers[target];

                const isRunnerUp = (target + 1) === 2;
                const label = isRunnerUp ? "準優勝" : `${target + 1}位`;

                const cls = `reveal-others ${isRunnerUp ? 'reveal-runnerup' : ''}`;
                
                addCard(label, p, cls, true);
                revealedIdx++;

                if (revealedIdx === middleLimit) {
                    document.getElementById('reveal-btn').textContent = '優勝とラスを発表する';
                }
            } else if (revealedIdx === middleLimit) {
                const winner = sortedPlayers[0];
                const last = sortedPlayers[len - 1];
                
                addCard('優勝', winner, 'reveal-winner shadow-md font-black scale-105 my-1', true);
                addCard('ラス 💀', last, 'reveal-last shadow-md scale-105 my-1', true); 

                document.getElementById('action-bar').classList.add('hidden');
            }
        }

        function addCard(label, data, cls, isPrepend) {
            const list = document.getElementById('ranking-list');
            const div = document.createElement('div');
            div.className = `ranking-item show p-2 px-4 rounded-lg flex justify-between items-center mx-auto w-full max-w-2xl ${cls}`;
            div.innerHTML = `
                <div class="flex flex-col min-w-0">
                    <span class="text-[7px] font-black uppercase tracking-widest opacity-60 mb-0.5">${label}</span>
                    <span class="text-[11px] font-black truncate item-text uppercase">${data.name}</span>
                </div>
                <div class="text-right shrink-0 ml-3">
                    <div class="text-[7px] font-bold sub-text">G:${data.gross} H:${data.hdcp.toFixed(1)}</div>
                    <div class="text-base font-black tracking-tight leading-none item-text">${data.net.toFixed(1)}</div>
                </div>
            `;
            if (isPrepend) list.prepend(div);
            else list.appendChild(div);
        }

        function changeTab(tab) {
            activeMode = tab;
            ['OUT', 'IN', 'SUMMARY'].forEach(t => {
                const b = document.getElementById(`tab-${t}`);
                if (t === tab) {
                    b.className = "flex-1 py-3 text-slate-900 border-b-4 border-slate-900 bg-white transition-all";
                } else {
                    b.className = "flex-1 py-3 text-slate-400 hover:text-slate-600 border-b-4 border-transparent transition-all" + (t === 'SUMMARY' ? ' border-l' : '');
                }
            });

            if (tab === 'SUMMARY') {
                document.getElementById('main-content').classList.add('hidden');
                document.getElementById('summary-view').classList.remove('hidden');
                renderSummary();
            } else {
                document.getElementById('main-content').classList.remove('hidden');
                document.getElementById('summary-view').classList.add('hidden');
                initApp();
            }
        }

        function renderSummary() {
            const container = document.getElementById('summary-container');
            container.innerHTML = '';
            
            ['OUT', 'IN'].forEach(m => {
                const data = calc(m);
                const block = document.createElement('div');
                block.className = "flex flex-col mb-8";
                block.innerHTML = `
                    <div class="flex items-end justify-between mb-3 border-b-2 border-slate-900 pb-1.5">
                        <h2 class="text-sm font-black tracking-tighter text-slate-900 uppercase">${m} RESULTS</h2>
                        <span class="text-[8px] font-bold text-slate-400 uppercase">Hidden: ${config[m].hHoles.join(', ')}</span>
                    </div>
                    <div class="flex flex-col gap-1">
                        ${data.map((d, i) => {
                            let label = `${i + 1}位`;
                            let cls = "bg-white border-slate-100";
                            if (i === 0) { label = "優勝"; cls = "summary-winner"; }
                            else if (i === 1) { label = "準優勝"; cls = "summary-runnerup"; }
                            else if (i === data.length - 1) { label = "ラス 💀";
                            cls = "summary-last"; }
                            
                            return `
                                <div class="flex items-center justify-between p-1.5 px-3 rounded border text-[10px] ${cls}">
                                    <span class="w-10 font-black opacity-60 uppercase">${label}</span>
                                    <span class="flex-1 font-bold truncate mx-3 item-text uppercase tracking-tight">${d.name}</span>
                                    <span class="font-black text-xs text-right item-text">${d.net.toFixed(1)}</span>
                                </div>
                            `;
                        }).join('')}
                    </div>
                `;
                container.appendChild(block);
            });
        }

        window.onload = initApp;
    </script>
</body>
</html>
