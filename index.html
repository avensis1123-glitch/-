<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ゴルフコンペ成績発表</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .reveal-item {
      opacity: 0;
      transform: translateY(20px);
      transition: opacity 0.6s ease-out, transform 0.6s ease-out;
    }
    .reveal-item.show {
      opacity: 1;
      transform: translateY(0);
    }
    .gold-gradient {
      background: linear-gradient(135deg, #fef08a 0%, #eab308 50%, #ca8a04 100%);
      color: #422006 !important;
      border: 2px solid #eab308;
    }
    .skull-dark {
      background: linear-gradient(135deg, #374151 0%, #111827 100%);
      color: #f3f4f6 !important;
      border: 2px solid #030712;
    }
    .skull-dark .text-gray-500 {
      color: #9ca3af !important;
    }
  </style>
</head>
<body class="bg-gray-100 font-sans antialiased min-h-screen text-gray-800 pb-16">
  <div class="max-w-3xl mx-auto pt-10 px-4">
    <header class="text-center mb-8">
      <h1 class="text-3xl font-bold tracking-tight text-gray-900 mb-2">🏆 ゴルフコンペ成績発表</h1>
      <p class="text-sm font-medium text-gray-600 bg-gray-200 inline-block px-4 py-1 rounded-full">
        隠しホール設定 ⛳ OUT: 1, 4, 5 ／ IN: 10, 12, 14
      </p>
    </header>

    <div class="bg-white shadow-md rounded-lg overflow-hidden">
      <div class="flex border-b text-center">
        <button id="btn-out" class="flex-1 py-4 text-sm font-medium border-b-2 border-blue-600 text-blue-600 transition-colors" onclick="switchTab('out')">OUT 発表</button>
        <button id="btn-in" class="flex-1 py-4 text-sm font-medium border-b-2 border-transparent text-gray-500 hover:text-gray-700 transition-colors" onclick="switchTab('in')">IN 発表</button>
        <button id="btn-list" class="flex-1 py-4 text-sm font-medium border-b-2 border-transparent text-gray-500 hover:text-gray-700 transition-colors" onclick="switchTab('list')">RESULTS LIST</button>
      </div>

      <div class="p-6">
        <div id="out-tab">
          <div class="text-center mb-6">
            <button id="out-btn" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-8 rounded-full shadow-lg transition-all duration-300 transform hover:scale-105">
              結果を順に発表する
            </button>
          </div>
          <div id="out-list" class="space-y-3 flex flex-col"></div>
        </div>

        <div id="in-tab" class="hidden">
          <div class="text-center mb-6">
            <button id="in-btn" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-8 rounded-full shadow-lg transition-all duration-300 transform hover:scale-105">
              結果を順に発表する
            </button>
          </div>
          <div id="in-list" class="space-y-3 flex flex-col"></div>
        </div>

        <div id="list-tab" class="hidden">
          <div id="list-tab-content"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // 1. データ定義と隠しホールのハードコード
    const data = {
      "course": {
        "OUT_par": [4, 4, 4, 3, 5, 4, 3, 5, 4],
        "IN_par": [4, 4, 3, 4, 5, 4, 5, 3, 4]
      },
      "players": [
        {"name": "プレイヤーA", "scores": [4, 5, 4, 3, 5, 4, 4, 6, 4, 4, 5, 4, 4, 6, 5, 6, 3, 4]},
        {"name": "プレイヤーB", "scores": [4, 4, 5, 4, 6, 5, 3, 6, 5, 5, 5, 4, 5, 6, 4, 6, 4, 5]},
        {"name": "プレイヤーC", "scores": [4, 5, 5, 4, 6, 5, 4, 6, 5, 4, 5, 4, 5, 6, 5, 6, 4, 5]},
        {"name": "プレイヤーD", "scores": [5, 4, 4, 4, 5, 4, 4, 5, 5, 5, 4, 3, 5, 5, 5, 6, 4, 5]},
        {"name": "プレイヤーE", "scores": [4, 4, 4, 3, 6, 4, 3, 5, 5, 4, 4, 4, 4, 5, 4, 5, 4, 5]},
        {"name": "プレイヤーF", "scores": [5, 5, 5, 3, 7, 5, 4, 6, 5, 5, 5, 4, 5, 7, 5, 6, 4, 5]},
        {"name": "プレイヤーG", "scores": [4, 5, 4, 4, 6, 4, 4, 5, 4, 5, 5, 3, 4, 6, 5, 5, 3, 5]},
        {"name": "プレイヤーH", "scores": [4, 5, 5, 4, 6, 5, 4, 6, 5, 4, 5, 4, 5, 6, 5, 6, 4, 5]},
        {"name": "プレイヤーI", "scores": [5, 6, 6, 4, 7, 5, 5, 7, 5, 5, 5, 5, 6, 7, 6, 7, 5, 6]},
        {"name": "プレイヤーJ", "scores": [4, 4, 4, 3, 6, 4, 3, 5, 5, 4, 4, 4, 4, 5, 4, 5, 4, 5]}
      ]
    };

    // ハードコードされた隠しホール (インデックス: 0始まり)
    // OUT: Hole 1(Par4=0), Hole 4(Par3=3), Hole 5(Par5=4)
    const outHiddenIndices = [0, 3, 4];
    // IN: Hole 10(Par4=0), Hole 12(Par3=2), Hole 14(Par5=4)
    const inHiddenIndices = [0, 2, 4];

    // 2. スコア計算処理 (簡易新ペリア)
    function calculateResults(half) {
      const isOut = half === 'OUT';
      const hiddenIndices = isOut ? outHiddenIndices : inHiddenIndices;
      const offset = isOut ? 0 : 9;
      const parArray = isOut ? data.course.OUT_par : data.course.IN_par;
      const parTotal = parArray.reduce((a, b) => a + b, 0); // 36

      const results = data.players.map(p => {
        const halfScores = p.scores.slice(offset, offset + 9);
        const gross = halfScores.reduce((a, b) => a + b, 0);
        const hiddenGross = hiddenIndices.reduce((a, idx) => a + halfScores[idx], 0);
        
        const hdcp = (hiddenGross * 3 - parTotal) * 0.8;
        const net = parseFloat((gross - hdcp).toFixed(1));

        return { name: p.name, gross, hdcp: hdcp.toFixed(1), net };
      });

      // 順位付け: ネット昇順 -> グロス昇順
      results.sort((a, b) => {
        if (a.net !== b.net) return a.net - b.net;
        return a.gross - b.gross;
      });

      return results.map((r, i) => ({ ...r, rank: i + 1 }));
    }

    const resultsOut = calculateResults('OUT');
    const resultsIn = calculateResults('IN');

    // 3. アニメーション付き発表管理クラス
    class Presentation {
      constructor(containerId, buttonId, results) {
        this.container = document.getElementById(containerId);
        this.button = document.getElementById(buttonId);
        this.results = results;
        
        // 発表順序: 9位(idx:8) -> 2位(idx:1) (※0始まりインデックス)
        this.revealSequence = [];
        for (let i = this.results.length - 2; i >= 1; i--) {
          this.revealSequence.push(i);
        }
        
        this.currentStep = 0;
        this.isFinal = false;

        this.renderInitial();
        this.button.addEventListener('click', () => this.nextReveal());
      }

      renderInitial() {
        this.container.innerHTML = '';
        this.results.forEach((p, i) => {
          const div = document.createElement('div');
          div.id = `${this.container.id}-item-${i}`;
          // 順位順（1位が上）になるようにCSSのorderを利用して視覚的な並びを維持
          div.className = `reveal-item hidden p-4 rounded shadow flex justify-between items-center bg-white border border-gray-200 order-${i}`;
          div.style.order = i;

          let rankHtml = `<span class="text-xl font-bold text-gray-500">${p.rank}位</span>`;
          let extraClass = '';

          if (i === 0) { // 優勝
            extraClass = 'gold-gradient shadow-xl transform scale-105 transition-transform duration-500 z-10';
            rankHtml = `<span class="text-2xl font-black flex items-center gap-2">👑 優勝</span>`;
          } else if (i === this.results.length - 1) { // 最下位
            extraClass = 'skull-dark shadow-md';
            rankHtml = `<span class="text-xl font-bold flex items-center gap-2">💀 最下位</span>`;
          }

          div.innerHTML = `
            <div class="flex items-center gap-4">
              <div class="w-32">${rankHtml}</div>
              <div class="text-lg font-semibold">${p.name}</div>
            </div>
            <div class="text-right text-sm">
              <div class="mb-1">Net: <span class="text-2xl font-bold">${p.net.toFixed(1)}</span></div>
              <div class="text-gray-500 text-xs">Gross: ${p.gross} (Hdcp: ${p.hdcp})</div>
            </div>
          `;

          if (i === 0 || i === this.results.length - 1) {
             div.dataset.specialClass = extraClass;
          }

          this.container.appendChild(div);
        });
      }

      nextReveal() {
        if (this.isFinal) {
          this.revealSpecial(0); // 優勝
          this.revealSpecial(this.results.length - 1); // 最下位
          
          this.button.disabled = true;
          this.button.textContent = '全順位発表完了';
          this.button.classList.replace('bg-red-600', 'bg-gray-400');
          this.button.classList.replace('hover:bg-red-700', 'hover:bg-gray-400');
          this.button.classList.remove('hover:scale-105');
          this.button.classList.add('cursor-not-allowed');
          return;
        }

        const idxToReveal = this.revealSequence[this.currentStep];
        this.revealNormal(idxToReveal);
        this.currentStep++;

        if (this.currentStep >= this.revealSequence.length) {
          this.isFinal = true;
          this.button.textContent = '優勝とラスを発表する';
          this.button.classList.replace('bg-blue-600', 'bg-red-600');
          this.button.classList.replace('hover:bg-blue-700', 'hover:bg-red-700');
        }
      }

      revealNormal(index) {
        const el = document.getElementById(`${this.container.id}-item-${index}`);
        el.classList.remove('hidden');
        void el.offsetWidth; // リフロー強制
        el.classList.add('show');
      }

      revealSpecial(index) {
        const el = document.getElementById(`${this.container.id}-item-${index}`);
        el.classList.remove('hidden', 'bg-white', 'border-gray-200');
        el.className += ' ' + el.dataset.specialClass;
        void el.offsetWidth; // リフロー強制
        el.classList.add('show');
      }
    }

    // インスタンス化
    new Presentation('out-list', 'out-btn', resultsOut);
    new Presentation('in-list', 'in-btn', resultsIn);

    // 4. RESULTS LIST 描画
    function renderResultsList() {
      const container = document.getElementById('list-tab-content');
      
      const createTable = (results, title) => `
        <div class="mb-8">
          <h3 class="text-xl font-bold mb-4 border-l-4 border-blue-600 pl-3 text-gray-800">${title}</h3>
          <div class="overflow-x-auto rounded-lg border border-gray-200">
            <table class="w-full text-sm text-left text-gray-600">
              <thead class="text-xs text-gray-700 uppercase bg-gray-50 border-b">
                <tr>
                  <th class="px-6 py-3">順位</th>
                  <th class="px-6 py-3">名前</th>
                  <th class="px-6 py-3 text-right">Gross</th>
                  <th class="px-6 py-3 text-right">Hdcp</th>
                  <th class="px-6 py-3 text-right bg-blue-50">Net</th>
                </tr>
              </thead>
              <tbody>
                ${results.map((r, i) => `
                  <tr class="bg-white border-b hover:bg-gray-50 transition-colors ${i === 0 ? 'bg-yellow-50' : ''}">
                    <td class="px-6 py-4 font-bold ${i === 0 ? 'text-yellow-600' : 'text-gray-900'}">${r.rank}</td>
                    <td class="px-6 py-4 font-medium text-gray-900">${r.name}</td>
                    <td class="px-6 py-4 text-right">${r.gross}</td>
                    <td class="px-6 py-4 text-right">${r.hdcp}</td>
                    <td class="px-6 py-4 text-right font-bold text-blue-600 bg-blue-50/30">${r.net.toFixed(1)}</td>
                  </tr>
                `).join('')}
              </tbody>
            </table>
          </div>
        </div>
      `;

      container.innerHTML = createTable(resultsOut, 'OUT ハーフ結果') + createTable(resultsIn, 'IN ハーフ結果');
    }
    renderResultsList();

    // 5. タブ切り替え処理
    function switchTab(tabName) {
      ['out', 'in', 'list'].forEach(name => {
        document.getElementById(`${name}-tab`).classList.add('hidden');
        const btn = document.getElementById(`btn-${name}`);
        btn.classList.remove('border-blue-600', 'text-blue-600');
        btn.classList.add('border-transparent', 'text-gray-500');
      });

      document.getElementById(`${tabName}-tab`).classList.remove('hidden');
      const activeBtn = document.getElementById(`btn-${tabName}`);
      activeBtn.classList.remove('border-transparent', 'text-gray-500');
      activeBtn.classList.add('border-blue-600', 'text-blue-600');
    }
  </script>
</body>
</html>
