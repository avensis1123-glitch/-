<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ラスベガス集計アプリ(完全スクラッチ仕様)</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
    /* 全要素の横幅計算にpaddingとborderを含める（はみ出し防止） */
    *, *::before, *::after {
        box-sizing: border-box;
    }

    body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        background: radial-gradient(circle at top, #2b1055 0%, #0b0115 100%);
        color: #eee;
        margin: 0;
        padding: 0;
        min-height: 100vh;
    }
    .view-section { display: none; padding-bottom: 20px; }
    .view-section.active { display: block; }
    
    .sticky-header {
        position: sticky;
        top: 0;
        background: linear-gradient(to bottom, #d4af37, #9b7000);
        color: #111;
        padding: 10px;
        z-index: 1000;
        box-shadow: 0 2px 10px rgba(255,215,0,0.4);
        border-bottom: 2px solid #fff;
    }
    .totals-grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 5px;
        text-align: center;
        font-size: 0.85rem;
    }
    .totals-grid div {
        background: rgba(0,0,0,0.6);
        padding: 5px;
        border-radius: 4px;
        border: 1px solid rgba(255,215,0,0.6);
        color: #fff;
    }
    .totals-name { font-weight: bold; margin-bottom: 3px; font-size: 0.9rem; text-shadow: 0 0 3px #fff;}
    .totals-pt { font-size: 0.85rem; font-weight: bold;}
    
    .container { padding: 10px 15px; max-width: 500px; margin: 0 auto; }
    
    .card {
        background: rgba(20, 10, 40, 0.85);
        border-radius: 8px;
        box-shadow: 0 0 15px rgba(249,0,255,0.3);
        border: 1px solid #ff007f;
        margin-bottom: 10px;
        padding: 15px;
        width: 100%;
    }
    .card-title {
        font-size: 1.1rem;
        font-weight: bold;
        border-bottom: 2px solid #333;
        padding-bottom: 8px;
        margin-bottom: 15px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        color: #00e5ff;
        text-shadow: 0 0 5px #00e5ff;
    }
    
    .info-box {
        background: rgba(0,0,0,0.5);
        border: 1px solid #444;
        border-radius: 6px;
        padding: 10px;
        margin-bottom: 15px;
        font-size: 0.85rem;
        color: #ccc;
        line-height: 1.4;
    }
    .info-formula {
        color: #ffd700;
        font-weight: bold;
        margin-top: 6px;
        font-size: 0.95rem;
        text-align: center;
        background: rgba(255,215,0,0.1);
        padding: 5px;
        border-radius: 4px;
        border: 1px dashed #ffd700;
    }

    .input-group {
        display: flex;
        align-items: center;
        margin-bottom: 12px;
        gap: 5px;
        width: 100%;
    }
    .input-group label {
        flex: 0 0 35px;
        font-size: 0.85rem;
        color: #ccc;
        font-weight: bold;
    }
    select, input[type="text"], input[type="number"] {
        padding: 10px;
        border: 1px solid #555;
        border-radius: 4px;
        font-size: 1rem;
        background-color: #111;
        color: #fff;
    }
    /* 横幅はみ出し防止用の調整 */
    .name-input { 
        flex: 1; 
        min-width: 0; 
    }
    .avg-input { 
        flex: 0 0 65px; 
        text-align: center; 
        padding: 10px 5px; 
    }
    
    select:focus, input:focus {
        outline: none;
        border-color: #00e5ff;
        box-shadow: 0 0 5px #00e5ff;
    }
    
    .score-row {
        display: flex;
        gap: 10px;
        margin-bottom: 12px;
        align-items: center;
        background: rgba(0, 0, 0, 0.5);
        padding: 8px 10px;
        border-radius: 6px;
        border: 1px solid #444;
        transition: all 0.3s ease;
    }
    .score-row.team-x {
        border-color: #ff007f;
        box-shadow: inset 0 0 10px rgba(255,0,127,0.2);
    }
    .score-row.team-y {
        border-color: #00e5ff;
        box-shadow: inset 0 0 10px rgba(0,229,255,0.2);
    }
    
    .player-label {
        flex: 1;
        font-size: 1rem; 
        font-weight: bold;
        color: #fff; 
        display: flex;
        flex-direction: column;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
    }
    .team-badge {
        font-size: 0.7rem;
        font-weight: normal;
        margin-top: 2px;
    }
    .team-x .team-badge { color: #ff007f; }
    .team-y .team-badge { color: #00e5ff; }
    
    .score-row .score-select {
        flex: 0 0 85px;
        text-align: center;
        font-size: 1.1rem;
        padding: 8px 4px;
    }
    
    .hole-result {
        background: rgba(255, 215, 0, 0.1);
        padding: 12px;
        border-radius: 6px;
        margin-top: 15px;
        font-size: 0.9rem;
        border: 1px solid #ffd700;
        box-shadow: inset 0 0 10px rgba(255,215,0,0.1);
    }
    .result-row {
        display: flex;
        justify-content: space-between;
        margin-bottom: 8px;
    }
    
    .btn {
        background: linear-gradient(90deg, #ff007f, #7f00ff);
        color: white;
        border: none;
        padding: 15px;
        font-size: 1.1rem;
        border-radius: 6px;
        cursor: pointer;
        width: 100%;
        font-weight: bold;
        text-align: center;
        display: block;
        box-shadow: 0 0 10px rgba(255,0,127,0.5);
        margin-top: 10px;
        text-shadow: 0 0 3px #fff;
    }
    .btn:active { transform: scale(0.98); }
    .btn-secondary { 
        background: transparent; 
        border: 1px solid #aaa; 
        color: #aaa; 
        box-shadow: none; 
        text-shadow: none; 
        margin-top: 15px;
    }
    .btn-info { 
        background: linear-gradient(90deg, #00e5ff, #007fff);
        box-shadow: 0 0 10px rgba(0,229,255,0.5);
        padding: 12px; 
        font-size: 1rem; 
    }

    .result-table {
        width: 100%;
        border-collapse: collapse;
        text-align: center;
        font-size: 0.75rem;
    }
    .result-table th, .result-table td {
        border: 1px solid #444;
        padding: 2px 1px;
        line-height: 1.1;
        color: #fff;
    }
    .result-table th {
        background-color: #1a0b2e;
        color: #ffd700;
        padding: 4px 1px;
    }
    .result-table tr:nth-child(even) td {
        background-color: rgba(255,255,255,0.05);
    }
    
    #captureArea {
        background: #11081f !important;
        border: 2px solid #00e5ff;
        box-shadow: 0 0 15px rgba(0,229,255,0.3);
    }
</style>
</head>
<body>

    <div id="setupView" class="view-section active">
        <div class="container">
            <div class="card" style="margin-top: 5px;">
                <div class="card-title">CASINO SETUP</div>
                
                <div class="info-box">
                    スタートホールの打順に合わせて名前と自己申告スコアを入力してください。申告スコアをもとに初期ポイントが自動で付与されます。
                    <div class="info-formula">
                        (自分のスコア − 4人の平均) × 5
                    </div>
                    <div style="font-size: 0.7rem; color: #999; margin-top: 4px; text-align: center;">※端数調整により4人の合計は必ず±0になります</div>
                </div>

                <div class="input-group">
                    <label>1番</label>
                    <input type="text" id="name0" class="name-input" value="プレイヤー1">
                    <input type="number" id="avg0" class="avg-input" value="90" title="平均スコア">
                </div>
                <div class="input-group">
                    <label>2番</label>
                    <input type="text" id="name1" class="name-input" value="プレイヤー2">
                    <input type="number" id="avg1" class="avg-input" value="100" title="平均スコア">
                </div>
                <div class="input-group">
                    <label>3番</label>
                    <input type="text" id="name2" class="name-input" value="プレイヤー3">
                    <input type="number" id="avg2" class="avg-input" value="110" title="平均スコア">
                </div>
                <div class="input-group">
                    <label>4番</label>
                    <input type="text" id="name3" class="name-input" value="プレイヤー4">
                    <input type="number" id="avg3" class="avg-input" value="110" title="平均スコア">
                </div>
                
                <hr style="border: 0; border-top: 1px solid #444; margin: 15px 0;">
                
                <div class="input-group" style="margin-bottom: 8px;">
                    <label style="flex: 0 0 75px;">開始ホール</label>
                    <select id="startHoleInput" style="flex:1;">
                        <option value="1">1番ホール (OUTスタート)</option>
                        <option value="10">10番ホール (INスタート)</option>
                    </select>
                </div>
                
                <hr style="border: 0; border-top: 1px solid #444; margin: 15px 0;">
                <div style="font-size: 0.85rem; color: #aaa; margin-bottom: 5px; font-weight: bold;">各ホールのパー数設定</div>
                <div id="parInputContainer" style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; margin-bottom: 10px;">
                    </div>
                
                <button class="btn" id="startBtn" style="margin-top: 20px;">GAME START</button>
            </div>
        </div>
    </div>

    <div id="gameView" class="view-section">
        <div class="sticky-header">
            <div style="font-size: 0.8rem; text-align: center; margin-bottom: 5px; font-weight: bold;">TOTAL CHIPS (初期ハンデ込)</div>
            <div class="totals-grid">
                <div><div class="totals-name" id="h-name0">A</div><div id="h-total0">0</div><div class="totals-pt" id="h-yen0">¥0</div></div>
                <div><div class="totals-name" id="h-name1">B</div><div id="h-total1">0</div><div class="totals-pt" id="h-yen1">¥0</div></div>
                <div><div class="totals-name" id="h-name2">C</div><div id="h-total2">0</div><div class="totals-pt" id="h-yen2">¥0</div></div>
                <div><div class="totals-name" id="h-name3">D</div><div id="h-total3">0</div><div class="totals-pt" id="h-yen3">¥0</div></div>
            </div>
        </div>

        <div class="container">
            <div class="card">
                <div class="card-title">
                    <span id="currentHoleLabel" style="color: #fff; text-shadow: none;">Hole -- (1/18)</span>
                    <span style="font-size: 0.9rem; font-weight: normal; color: #ffd700;">Par 
                        <select id="currentPar" style="width:60px; padding: 4px;">
                            <option value="3">3</option><option value="4">4</option><option value="5">5</option>
                        </select>
                    </span>
                </div>
                
                <div style="font-size:0.8rem; color:#aaa; margin-bottom:10px; text-align:center;" id="rotationInfo"></div>

                <div class="score-row" id="row0">
                    <div class="player-label"><span id="lbl_name0">Player1</span><span class="team-badge" id="lbl_team0"></span></div>
                    <select id="score0" class="score-select"></select>
                </div>
                <div class="score-row" id="row1">
                    <div class="player-label"><span id="lbl_name1">Player2</span><span class="team-badge" id="lbl_team1"></span></div>
                    <select id="score1" class="score-select"></select>
                </div>
                <div class="score-row" id="row2">
                    <div class="player-label"><span id="lbl_name2">Player3</span><span class="team-badge" id="lbl_team2"></span></div>
                    <select id="score2" class="score-select"></select>
                </div>
                <div class="score-row" id="row3">
                    <div class="player-label"><span id="lbl_name3">Player4</span><span class="team-badge" id="lbl_team3"></span></div>
                    <select id="score3" class="score-select"></select>
                </div>

                <div class="hole-result">
                    <div class="result-row">
                        <span style="color:#ff007f; text-shadow: 0 0 3px #ff007f;">チームX: <strong id="preview_tX">-</strong></span>
                        <span style="color:#00e5ff; text-shadow: 0 0 3px #00e5ff;">チームY: <strong id="preview_tY">-</strong></span>
                    </div>
                    <div class="result-row" style="margin-top: 5px;">
                        <span style="font-weight:bold; color:#fff;">発生キャリー: <span id="preview_carry" style="color:#ffd700; text-shadow: 0 0 5px #ffd700; font-size:1.2rem;">1x</span></span>
                    </div>
                    <div class="result-row" style="font-size: 0.85rem; margin-top: 5px; color:#ccc; align-items:center;">
                        <span>移動Pt:</span>
                        <span id="preview_pts" style="color:#fff; font-weight:bold;">-</span>
                    </div>
                </div>

                <button class="btn" id="nextBtn">SAVE & NEXT</button>
                <button class="btn btn-secondary" id="backBtn" style="display:none;">UNDO (戻る)</button>
            </div>
        </div>
    </div>

    <div id="resultView" class="view-section">
        <div class="container" style="padding-top: 5px;">
            <div class="card" id="captureArea" style="padding: 5px 8px; border-radius: 8px; margin-bottom: 5px;">
                <div class="card-title" style="margin-bottom: 3px; padding-bottom: 3px; font-size: 1rem; text-align:center; justify-content:center; color:#ffd700; border-bottom: 1px solid #ffd700;">FINAL RESULT</div>
                <div id="resultTableContainer"></div>
            </div>
            <button class="btn btn-info" id="downloadBtn" style="margin-top: 8px;">結果をPNG画像でダウンロード</button>
        </div>
    </div>

<script>
    const HOLES = 18;
    const RATE = 50;
    const MAX_DIFF_NORMAL = 20;
    const MAX_DIFF_BIRDIE = 50; 
    const MAX_SCORE = 15;
    const HANDICAP_COEF = 5;

    let players = [];
    let initialPts = [0, 0, 0, 0];
    let holeSequence = [];
    let currentStep = 0; 
    let initialPars = {}; 
    let roundData = []; 
    let currentCarryMultiplier = 1;
    
    let tX_indices = [];
    let tY_indices = [];

    (function initApp() {
        // Setup Par Inputs dynamically
        const parContainer = document.getElementById('parInputContainer');
        for(let i=1; i<=18; i++) {
            let div = document.createElement('div');
            div.innerHTML = `<span>H${i}:</span><select id="parHole${i}"><option value="3">3</option><option value="4" selected>4</option><option value="5">5</option></select>`;
            parContainer.appendChild(div);
        }

        const scoreSelects = document.querySelectorAll('.score-select');
        scoreSelects.forEach(sel => {
            sel.innerHTML = '';
            for(let i=1; i<=MAX_SCORE; i++) {
                let opt = document.createElement('option');
                opt.value = String(i);
                opt.textContent = i + '打';
                sel.appendChild(opt);
            }
        });

        document.getElementById('startBtn').addEventListener('click', startGame);
        document.getElementById('nextBtn').addEventListener('click', goToNextHole);
        document.getElementById('backBtn').addEventListener('click', goBack);
        document.getElementById('downloadBtn').addEventListener('click', downloadPNG);

        const changeTriggers = ['currentPar', 'score0', 'score1', 'score2', 'score3'];
        changeTriggers.forEach(id => {
            let el = document.getElementById(id);
            if(el) el.addEventListener('change', calcPreview);
        });
    })();

    function startGame() {
        players = [];
        let avgs = [];
        for(let i=0; i<4; i++) {
            players.push(document.getElementById(`name${i}`).value || `Player${i+1}`);
            let avg = parseInt(document.getElementById(`avg${i}`).value, 10);
            avgs.push(isNaN(avg) ? 100 : avg);
            document.getElementById(`h-name${i}`).textContent = players[i].substring(0,4);
            document.getElementById(`lbl_name${i}`).textContent = players[i];
        }

        // ハンデの自動算出 (係数5の完全ゼロサム)
        let totalAvg = avgs.reduce((a, b) => a + b, 0) / 4;
        let ptsCalc = avgs.map(a => Math.round((a - totalAvg) * HANDICAP_COEF));
        let sum3 = ptsCalc[0] + ptsCalc[1] + ptsCalc[2];
        ptsCalc[3] = -sum3; // 端数調整で確実にゼロにする
        initialPts = ptsCalc;

        let sHole = parseInt(document.getElementById('startHoleInput').value, 10);
        holeSequence = [];
        for(let i=0; i<HOLES; i++) {
            let h = sHole + i;
            if(h > 18) h -= 18;
            holeSequence.push(h);
        }

        initialPars = {};
        for(let i=1; i<=18; i++) {
            let pEl = document.getElementById(`parHole${i}`);
            initialPars[String(i)] = pEl ? pEl.value : "4";
        }

        roundData = [];
        currentStep = 0;
        currentCarryMultiplier = 1;
        updateHeaderTotals();

        switchView('gameView');
        renderCurrentHole();
    }

    function switchView(viewId) {
        document.querySelectorAll('.view-section').forEach(el => el.classList.remove('active'));
        document.getElementById(viewId).classList.add('active');
        window.scrollTo(0, 0);
    }

    function renderCurrentHole() {
        let actualHole = holeSequence[currentStep];
        document.getElementById('currentHoleLabel').textContent = `Hole ${actualHole} (${currentStep + 1}/18)`;
        
        document.getElementById('backBtn').style.display = (currentStep > 0) ? 'block' : 'none';
        document.getElementById('nextBtn').textContent = (currentStep === 17) ? 'SAVE & FINISH (終了)' : 'SAVE & NEXT';

        // 3ホールローテーションのチーム分け判定
        let hMod = actualHole % 3;
        if (hMod === 1) {
            tX_indices = [0, 1]; tY_indices = [2, 3];
            document.getElementById('rotationInfo').textContent = "ローテーション: 1番・2番 vs 3番・4番";
        } else if (hMod === 2) {
            tX_indices = [0, 2]; tY_indices = [1, 3];
            document.getElementById('rotationInfo').textContent = "ローテーション: 1番・3番 vs 2番・4番";
        } else {
            tX_indices = [0, 3]; tY_indices = [1, 2];
            document.getElementById('rotationInfo').textContent = "ローテーション: 1番・4番 vs 2番・3番";
        }

        // UIのチームカラーを更新
        for(let i=0; i<4; i++) {
            let row = document.getElementById(`row${i}`);
            let badge = document.getElementById(`lbl_team${i}`);
            row.classList.remove('team-x', 'team-y');
            if(tX_indices.includes(i)) {
                row.classList.add('team-x');
                badge.textContent = "(チームX)";
            } else {
                row.classList.add('team-y');
                badge.textContent = "(チームY)";
            }
        }

        // スコアとパーの復元/初期化
        if (roundData[currentStep]) {
            let data = roundData[currentStep];
            document.getElementById('currentPar').value = String(data.par);
            for(let j=0; j<4; j++) {
                document.getElementById(`score${j}`).value = String(data.scores[j]);
            }
        } else {
            document.getElementById('currentPar').value = String(initialPars[String(actualHole)] || "4");
            for(let j=0; j<4; j++) {
                document.getElementById(`score${j}`).value = '4';
            }
        }

        calcPreview();
    }

    function calcPreview() {
        let par = parseInt(document.getElementById('currentPar').value, 10);
        let s = [];
        for(let j=0; j<4; j++) {
            s[j] = parseInt(document.getElementById(`score${j}`).value, 10);
        }

        let tX_scores = [s[tX_indices[0]], s[tX_indices[1]]];
        let tY_scores = [s[tY_indices[0]], s[tY_indices[1]]];

        let tX_birdie = (tX_scores[0] < par) || (tX_scores[1] < par);
        let tY_birdie = (tY_scores[0] < par) || (tY_scores[1] < par);

        // 加算バグを残す計算式
        let calcVegas = (scores, reverse) => {
            let min = Math.min(...scores);
            let max = Math.max(...scores);
            return reverse ? (max * 10 + min) : (min * 10 + max);
        };

        let tX_reverse = tY_birdie && !tX_birdie;
        let tY_reverse = tX_birdie && !tY_birdie;

        let tX_val = calcVegas(tX_scores, tX_reverse);
        let tY_val = calcVegas(tY_scores, tY_reverse);

        document.getElementById('preview_tX').textContent = tX_val;
        document.getElementById('preview_tY').textContent = tY_val;

        let diff = Math.abs(tX_val - tY_val);
        let activeMaxDiff = (tX_birdie || tY_birdie) ? MAX_DIFF_BIRDIE : MAX_DIFF_NORMAL;
        let isLimitBreak = diff > MAX_DIFF_NORMAL;

        if(diff > activeMaxDiff) diff = activeMaxDiff;

        let pts = diff * currentCarryMultiplier;
        let isTie = (tX_val === tY_val);

        document.getElementById('preview_carry').textContent = currentCarryMultiplier + 'x';
        
        let previewPtsEl = document.getElementById('preview_pts');
        if (isLimitBreak) {
            previewPtsEl.innerHTML = `<span style="color:#ff1744; font-size:1.2rem; text-shadow: 0 0 8px #ff1744;">🔥${pts} (限界突破)</span>`;
        } else {
            previewPtsEl.textContent = pts;
        }

        let move = [0, 0, 0, 0];
        if (!isTie) {
            if (tX_val < tY_val) {
                // Team X Wins
                move[tX_indices[0]] = pts; move[tX_indices[1]] = pts;
                move[tY_indices[0]] = -pts; move[tY_indices[1]] = -pts;
            } else {
                // Team Y Wins
                move[tX_indices[0]] = -pts; move[tX_indices[1]] = -pts;
                move[tY_indices[0]] = pts; move[tY_indices[1]] = pts;
            }
        }

        return {
            par: par,
            scores: s,
            tX_val: tX_val,
            tY_val: tY_val,
            pts: pts,
            move: move,
            isTie: isTie
        };
    }

    function goToNextHole() {
        let result = calcPreview();
        roundData[currentStep] = result;

        if (result.isTie) {
            currentCarryMultiplier++;
        } else {
            currentCarryMultiplier = 1;
        }

        updateHeaderTotals();

        currentStep++;
        if(currentStep >= HOLES) {
            showResultView();
        } else {
            renderCurrentHole();
            window.scrollTo(0, 0);
        }
    }

    function goBack() {
        if(currentStep > 0) {
            currentStep--;
            currentCarryMultiplier = 1;
            for(let i=0; i<currentStep; i++) {
                if(roundData[i].isTie) currentCarryMultiplier++;
                else currentCarryMultiplier = 1;
            }
            updateHeaderTotals();
            renderCurrentHole();
        }
    }

    function updateHeaderTotals() {
        let totals = [...initialPts];
        for(let i=0; i<=currentStep; i++) {
            if(roundData[i]) {
                for(let p=0; p<4; p++) totals[p] += roundData[i].move[p];
            }
        }
        for(let i=0; i<4; i++) {
            let elTotal = document.getElementById(`h-total${i}`);
            let elYen = document.getElementById(`h-yen${i}`);
            
            let color = totals[i] > 0 ? '#00e5ff' : (totals[i] < 0 ? '#ff1744' : '#ffffff');
            let sign = totals[i] > 0 ? '+' : '';
            
            elTotal.textContent = sign + totals[i];
            elTotal.style.color = color;
            elTotal.style.textShadow = `0 0 3px ${color}`;
            
            elYen.textContent = (totals[i] >= 0 ? '¥' : '-¥') + Math.abs(totals[i] * RATE);
            elYen.style.color = color;
            elYen.style.textShadow = `0 0 3px ${color}`;
        }
    }

    function showResultView() {
        switchView('resultView');
        
        let container = document.getElementById('resultTableContainer');
        let html = '<table class="result-table">';
        html += '<tr><th style="width:12%">Hole</th><th style="width:12%">Par</th>';
        for(let i=0; i<4; i++) html += `<th>${players[i].substring(0,4)}</th>`;
        html += '</tr>';
        
        // 初期ハンデ行の表示
        html += '<tr style="background-color: rgba(255,255,255,0.1);"><td colspan="2" style="font-size:0.7rem; color:#aaa;">初期ハンデ</td>';
        for(let i=0; i<4; i++) {
            let pt = initialPts[i];
            let color = pt > 0 ? '#00e5ff' : (pt < 0 ? '#ff1744' : '#aaaaaa');
            let sign = pt > 0 ? '+' : '';
            html += `<td style="color:${color}; font-weight:bold;">${sign}${pt}</td>`;
        }
        html += '</tr>';

        let totals = [...initialPts];
        
        for(let i=0; i<HOLES; i++) {
            let d = roundData[i];
            let hNum = holeSequence[i];
            html += `<tr><td>${hNum}</td><td>${d.par}</td>`;
            for(let p=0; p<4; p++) {
                let score = d.scores[p];
                let move = d.move[p];
                let moveStr = move > 0 ? `+${move}` : (move === 0 ? '±0' : String(move));
                let color = move > 0 ? '#00e5ff' : (move < 0 ? '#ff1744' : '#aaaaaa');
                html += `<td><span style="font-size:0.85rem;font-weight:bold;">${score}</span><br><span style="font-size:0.65rem;color:${color};text-shadow:0 0 2px ${color};">${moveStr}</span></td>`;
                totals[p] += move;
            }
            html += '</tr>';
        }
        
        html += '<tr style="background-color: rgba(255,215,0,0.15); font-weight: bold; border-top: 2px solid #ffd700;"><td>計</td><td>-</td>';
        for(let i=0; i<4; i++) {
            let color = totals[i] > 0 ? '#00e5ff' : (totals[i] < 0 ? '#ff1744' : '#ffffff');
            let sign = totals[i] > 0 ? '+' : '';
            html += `<td style="padding: 4px 1px;"><span style="color:${color};text-shadow:0 0 3px ${color};">${sign}${totals[i]}</span><br><span style="font-size:0.6rem; font-weight:normal; color:#ffd700;">${totals[i] >= 0 ? '¥' : '-¥'}${Math.abs(totals[i] * RATE)}</span></td>`;
        }
        html += '</tr></table>';
        
        container.innerHTML = html;
    }

    function downloadPNG() {
        let target = document.getElementById('captureArea');
        html2canvas(target, { scale: 2, backgroundColor: '#11081f' }).then(canvas => {
            let link = document.createElement('a');
            link.download = 'lasvegas_casino_result.png';
            link.href = canvas.toDataURL('image/png');
            link.click();
        });
    }
</script>
</body>
</html>
