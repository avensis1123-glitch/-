<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ラスベガス集計アプリ(完全スクラッチ仕様)</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
    *, *::before, *::after { box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: radial-gradient(circle at top, #2b1055 0%, #0b0115 100%); color: #eee; margin: 0; padding: 0; min-height: 100vh; }
    .view-section { display: none; padding-bottom: 20px; }
    .view-section.active { display: block; }
    .sticky-header { position: sticky; top: 0; background: linear-gradient(to bottom, #d4af37, #9b7000); color: #111; padding: 10px; z-index: 1000; box-shadow: 0 2px 10px rgba(255,215,0,0.4); border-bottom: 2px solid #fff; }
    .totals-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; text-align: center; font-size: 0.85rem; }
    .totals-grid div { background: rgba(0,0,0,0.6); padding: 5px; border-radius: 4px; border: 1px solid rgba(255,215,0,0.6); color: #fff; }
    .totals-name { font-weight: bold; margin-bottom: 3px; font-size: 0.9rem; }
    .totals-pt { font-size: 0.85rem; font-weight: bold; }
    .container { padding: 10px 15px; max-width: 500px; margin: 0 auto; }
    .card { background: rgba(20, 10, 40, 0.85); border-radius: 8px; border: 1px solid #ff007f; padding: 15px; width: 100%; }
    .card-title { font-size: 1.1rem; font-weight: bold; border-bottom: 2px solid #333; padding-bottom: 8px; margin-bottom: 15px; display: flex; justify-content: space-between; color: #00e5ff; }
    .input-group { display: flex; align-items: center; margin-bottom: 12px; gap: 5px; }
    .input-group label { flex: 0 0 45px; font-size: 0.85rem; color: #ccc; font-weight: bold; }
    .name-input { flex: 1; padding: 10px; border-radius: 4px; border: 1px solid #555; background: #111; color: #fff; }
    .avg-input { flex: 0 0 85px; padding: 10px; border-radius: 4px; border: 1px solid #555; background: #111; color: #fff; }
    
    .score-row { display: flex; gap: 10px; margin-bottom: 12px; align-items: center; background: rgba(0, 0, 0, 0.5); padding: 8px; border-radius: 6px; border: 2px solid #555; transition: 0.2s; }
    .score-row.team-x { border-color: #ff007f; background: rgba(255,0,127,0.1); }
    .score-row.team-y { border-color: #00e5ff; background: rgba(0,229,255,0.1); }
    
    .player-label { flex: 1; font-weight: bold; font-size: 0.9rem; }
    .score-select { flex: 0 0 85px; padding: 8px; font-size: 1.1rem; background: #111; color: #fff; border: 1px solid #555; }
    
    .btn { background: linear-gradient(90deg, #ff007f, #7f00ff); color: white; border: none; padding: 15px; width: 100%; border-radius: 6px; font-weight: bold; margin-top: 10px; }
    .result-table { width: 100%; border-collapse: collapse; font-size: 0.75rem; color: #fff; }
    .result-table th, .result-table td { border: 1px solid #444; padding: 4px; }
</style>
</head>
<body>

<div id="setupView" class="view-section active">
    <div class="container">
        <div class="card">
            <div class="card-title">CASINO SETUP</div>
            <div class="input-group"><label>オナー</label><input type="text" id="name0" class="name-input" value="オナー"><select id="avg0" class="avg-input"></select></div>
            <div class="input-group"><label>2nd</label><input type="text" id="name1" class="name-input" value="2nd"><select id="avg1" class="avg-input"></select></div>
            <div class="input-group"><label>3rd</label><input type="text" id="name2" class="name-input" value="3rd"><select id="avg2" class="avg-input"></select></div>
            <div class="input-group"><label>4th</label><input type="text" id="name3" class="name-input" value="4th"><select id="avg3" class="avg-input"></select></div>
            <button class="btn" id="startBtn">GAME START</button>
        </div>
    </div>
</div>

<div id="gameView" class="view-section">
    <div class="sticky-header">
        <div class="totals-grid">
            <div><div class="totals-name" id="h-name0">A</div><div id="h-total0">0</div><div class="totals-pt" id="h-yen0">¥0</div></div>
            <div><div class="totals-name" id="h-name1">B</div><div id="h-total1">0</div><div class="totals-pt" id="h-yen1">¥0</div></div>
            <div><div class="totals-name" id="h-name2">C</div><div id="h-total2">0</div><div class="totals-pt" id="h-yen2">¥0</div></div>
            <div><div class="totals-name" id="h-name3">D</div><div id="h-total3">0</div><div class="totals-pt" id="h-yen3">¥0</div></div>
        </div>
    </div>
    <div class="container">
        <div class="card">
            <div class="card-title"><span id="currentHoleLabel">Hole --</span></div>
            <div id="scoreRows">
                <div class="score-row" id="row0"><div class="player-label" id="lbl0"></div><select id="score0" class="score-select"></select></div>
                <div class="score-row" id="row1"><div class="player-label" id="lbl1"></div><select id="score1" class="score-select"></select></div>
                <div class="score-row" id="row2"><div class="player-label" id="lbl2"></div><select id="score2" class="score-select"></select></div>
                <div class="score-row" id="row3"><div class="player-label" id="lbl3"></div><select id="score3" class="score-select"></select></div>
            </div>
            <button class="btn" id="nextBtn">SAVE & NEXT</button>
        </div>
    </div>
</div>

<div id="resultView" class="view-section"><div class="container"><div class="card" id="captureArea"><div id="resultTableContainer"></div></div><button class="btn" id="downloadBtn">PNGで保存</button></div></div>

<script>
    const RATE = 50; // 指定により50に変更
    let players = [], initialPts = [], roundData = [], currentStep = 0;
    
    // 平均スコアの生成
    document.querySelectorAll('.avg-input').forEach(sel => {
        for(let i=70; i<=130; i+=5) {
            let opt = document.createElement('option'); opt.value = i; opt.textContent = i;
            if(i === 100) opt.selected = true;
            sel.appendChild(opt);
        }
    });

    // スコアの生成
    document.querySelectorAll('.score-select').forEach(sel => {
        for(let i=1; i<=15; i++) {
            let opt = document.createElement('option'); opt.value = i; opt.textContent = i + '打';
            if(i === 4) opt.selected = true;
            sel.appendChild(opt);
        }
        sel.addEventListener('change', calcPreview);
    });

    function startGame() {
        let avgs = [];
        for(let i=0; i<4; i++) {
            players.push(document.getElementById(`name${i}`).value);
            avgs.push(parseInt(document.getElementById(`avg${i}`).value));
            document.getElementById(`h-name${i}`).textContent = players[i].substring(0,4);
            document.getElementById(`lbl${i}`).textContent = players[i];
        }
        
        let avg = avgs.reduce((a,b)=>a+b)/4;
        let pts = avgs.map(a=>Math.round((a-avg)*5));
        
        // トップ重税ロジック
        let sorted = [0,1,2,3].sort((a,b)=>avgs[a]-avgs[b]);
        let tax = (pts[sorted[0]] - Math.round((avgs[sorted[0]]-avg)*(1-(avgs[sorted[0]]/avg))*50));
        pts[sorted[0]] -= tax;
        pts[sorted[1]] += tax * 0.7;
        pts[sorted[2]] += tax * 0.3;
        initialPts = pts.map(p=>Math.round(p));

        document.getElementById('setupView').classList.remove('active');
        document.getElementById('gameView').classList.add('active');
        updateHeaderTotals();
        renderHole();
    }

    function renderHole() {
        document.getElementById('currentHoleLabel').textContent = "Hole " + (currentStep + 1);
        calcPreview();
    }

    function calcPreview() {
        let s = [0,1,2,3].map(i=>parseInt(document.getElementById(`score${i}`).value));
        
        // ホール順でチーム分け (1&4 vs 2&3)
        let tX = [0, 3], tY = [1, 2];
        
        // 色付け
        [0,1,2,3].forEach(i => {
            let r = document.getElementById(`row${i}`);
            r.className = 'score-row ' + (tX.includes(i) ? 'team-x' : 'team-y');
        });

        let sX = [s[0], s[3]], sY = [s[1], s[2]];
        let vX = Math.min(...sX)*10 + Math.max(...sX);
        let vY = Math.min(...sY)*10 + Math.max(...sY);
        
        let pts = Math.min(Math.abs(vX - vY), 20);
        
        document.getElementById('preview_tX').textContent = vX;
        document.getElementById('preview_tY').textContent = vY;
        document.getElementById('preview_pts').textContent = pts;
        return {s, pts, tX, tY, vX, vY};
    }

    function goToNextHole() {
        let res = calcPreview();
        let move = [0,0,0,0];
        if(res.vX < res.vY) { move[res.tX[0]]=res.pts; move[res.tX[1]]=res.pts; move[res.tY[0]]=-res.pts; move[res.tY[1]]=-res.pts; }
        else if(res.vX > res.vY) { move[res.tX[0]]=-res.pts; move[res.tX[1]]=-res.pts; move[res.tY[0]]=res.pts; move[res.tY[1]]=res.pts; }
        
        roundData.push({...res, move});
        currentStep++;
        if(currentStep < 18) renderHole(); else showResult();
    }

    function updateHeaderTotals() {
        let t = [...initialPts];
        roundData.forEach(d => d.move.forEach((m,i) => t[i]+=m));
        t.forEach((v,i) => {
            document.getElementById(`h-total${i}`).textContent = (v>0?'+':'') + v;
            document.getElementById(`h-yen${i}`).textContent = '¥' + (v*RATE);
        });
    }

    function showResult() {
        document.getElementById('gameView').classList.remove('active');
        document.getElementById('resultView').classList.add('active');
        updateHeaderTotals();
    }
    function switchView(id) { /* 省略 */ }
    function downloadPNG() { /* html2canvas... */ }
</script>
</body>
</html>
